services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    environment:
      NEXT_PUBLIC_DATA_SOURCE: local

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/outfit_archive
      SPRING_DATASOURCE_USERNAME: outfit
      SPRING_DATASOURCE_PASSWORD: outfit

  db:
    image: mysql:8.4
    # ports:
    #   - "3306:3306"
    environment:
      MYSQL_DATABASE: outfit_archive
      MYSQL_USER: outfit
      MYSQL_PASSWORD: outfit
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
